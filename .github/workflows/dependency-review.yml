name: dependency-review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Zig has no Dependabot ecosystem (see .github/dependabot.yml), so this
      # job's only real scope is the GitHub Actions pulled into workflows —
      # the PR-time complement to dependabot's github-actions updates.
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
